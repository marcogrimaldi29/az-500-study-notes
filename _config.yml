##############################################################
# AZ-500 Study Notes
# Theme: Just the Docs
##############################################################
theme: just-the-docs

# ── Site identity ─────────────────────────────────────────
title: "AZ-500: Microsoft Azure Security Engineer Associate"
description: "Study Notes & Exam Prep — Microsoft Certified: Azure Security Engineer Associate"
url: "https://marcogrimaldi29.com"
baseurl: "/az-500-study-notes"
logo: "/assets/images/logo-sunrise-domain.jpg"
author: "Marco Grimaldi"
tagline: "Azure Security Engineer Associate — Exam Prep"

# Color scheme — overridden in _sass/custom/custom.scss
color_scheme: az500

# Navigation
# nav_sort: case_insensitive
nav_sort: order
nav_external_links:
  - title: "📄 Official AZ-500 Exam"
    url:   "https://learn.microsoft.com/en-us/credentials/certifications/azure-security-engineer/"
  - title: "📘 AZ-305 Study Notes"
    url: https://marcogrimaldi29.com/az-305-study-notes/
  - title: "📘 AZ-104 Study Notes"
    url: https://marcogrimaldi29.com/az-104-study-notes/
#  - title: "🏠 marcogrimaldi29.com"
#    url:   "https://marcogrimaldi29.com"

# Search
search_enabled:         true
search:
  heading_level:        2
  previews:             3
  preview_words_before: 5
  preview_words_after:  10
  tokenizer_separator:  /[\s/]+/
  rel_url:              true
  button:               false

# Aux links (top right)
aux_links:
  "🏠 Personal Hub of Marco Grimaldi":
    - "https://marcogrimaldi29.com"

aux_links_new_tab: true

# ── Back to top button ───────────────────────────────────────────────
back_to_top:      true
back_to_top_text: "Back to top ↑"

# Footer
footer_content: >
  Maintained by <a href="https://www.linkedin.com/in/marco-grimaldi29/">Marco Grimaldi</a>.
  Not affiliated with or endorsed by Microsoft. All content for study purposes only.
  Theme: <a href="https://github.com/just-the-docs/just-the-docs">Just the Docs</a> (MIT).
  Built with <a href="https://jekyllrb.com/">Jekyll</a> and hosted on <a href="https://pages.github.com/">GitHub Pages</a>.
  <br>

# Callout titles
callouts:
  highlight:
    title: 🎯 Exam Tip
    color: red
  important:
    title: ⚠️ Important
    color: yellow
  new:
    title: 🆕 New Feature
    color: green
  note:
    title: 📝 Note
    color: blue

# Mermaid
mermaid:
  version: "10.9.0"

# Plugins
plugins:
  - jekyll-default-layout
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
